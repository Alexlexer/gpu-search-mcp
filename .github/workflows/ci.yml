name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        # CPU-only build avoids the 2+ GB CUDA download in CI.
        # Semantic search will be unavailable, but all other tests pass.
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest

      - name: Lint with ruff (if available)
        run: |
          pip install ruff --quiet || true
          ruff check gpu_service/ tests/ || true
        continue-on-error: true

      - name: Run tests (excluding semantic model download)
        run: |
          pytest tests/ -v --timeout=60 \
            --ignore=tests/test_thread_safety.py \
            -k "not with_semantic"
        # test_thread_safety uses threading.Barrier which needs Python timing guarantees
        # that are flaky in constrained CI VMs; run locally instead.

      - name: Run smoke test (no semantic)
        run: python scripts/smoke_test.py
