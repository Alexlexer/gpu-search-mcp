name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        # CPU-only build avoids the 2+ GB CUDA download in CI.
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project
        # Semantic is explicit so the base package remains usable without model tooling.
        run: pip install -e ".[test,ast,semantic]"

      - name: Lint with ruff
        run: ruff check gpu_service/ scripts/ tests/

      - name: Run tests (excluding semantic model download)
        run: |
          pytest tests/ -v --timeout=60 \
            --ignore=tests/test_thread_safety.py \
            -k "not with_semantic"
        # test_thread_safety uses threading.Barrier which needs Python timing guarantees
        # that are flaky in constrained CI VMs; run locally instead.

      - name: Run retrieval quality and output-budget gates
        if: matrix.python-version == '3.12'
        run: python scripts/quality_gate.py

      - name: Run smoke test (no semantic)
        run: python scripts/smoke_test.py

  package:
    name: "Wheel and outside-checkout smoke"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU runtime and build tooling
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Install base wheel
        run: pip install dist/*.whl

      - name: Test installed CLI outside the checkout
        run: python scripts/package_smoke_test.py dist/*.whl
